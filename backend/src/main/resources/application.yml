spring:
  application:
    name: showdown-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

showdown:
  security:
    mode: ${AUTH_MODE:database}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
    admin-user: ${ADMIN_USER:}
    admin-password: ${ADMIN_PASSWORD:}
    referee-user: ${REFEREE_USER:}
    referee-password: ${REFEREE_PASSWORD:}
    player-user: ${PLAYER_USER:}
    player-password: ${PLAYER_PASSWORD:}
